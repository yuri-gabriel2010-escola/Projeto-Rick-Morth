<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <title>Document</title>
</head>

<body>
    <!--Barra de Navegação-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <!-- logo / titulo -->
            <a href="#" class="navbar-brand d-flex align-items-center">
                <img src="assets/logo.png" alt="logo" width="40" height="40" class="me-2 rounded-circle" />
                Rick & Morty Explorer
            </a>

            <!--botão mobile (hamburger)-->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!--itens da navbar-->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a href="#" class="nav-link active">Personagens</a>
                    </li>
                    <li class="nav-item"><a href="#" class="nav-link">Favoritos</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
        <main class="container my-4">
            <!-- Título da seção -->
            <h2 class="mb-4 text-center">Personagens</h2>
            <!--formulário de pesquisa-->
            <form id="search-form" class="mb-4">
                <div class="input-group">
                    <input type="text" id="search-input" class="form-control" placeholder="Buscar">
                    <button class="btn btn-primary">Buscar</button>
                </div>
            </form>
            <!-- Grid de cards -->
            <div class="row g-4" id="characters-container"></div>
        </main>
    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="./js/main.js"></script>
</body>

</html>
